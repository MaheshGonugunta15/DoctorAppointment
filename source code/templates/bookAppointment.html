{% include 'head.html'%}
<style>
    #cardNumber
    {
    padding:10px
    }
    #nameOnCard
    {
    padding:10px
    }
    #cvv
    {
    padding:10px
    }
    #expireDate
    {
    padding:10px
    }

</style>
<script>
    function validate(){
        let cardNumber = document.getElementById("cardNumber").value
        if(cardNumber.length !=16){
            alert("Card Number should be 16")
            return false;
        }
        let cause = document.getElementById("cause").value
        if(cause==""){
            alert("Enter Cause")
            return false;
        }
          let nameOnCard = document.getElementById("nameOnCard").value
        if(nameOnCard==""){
            alert("Enter NameOnCard")
            return false;
        }
         let cvv = document.getElementById("cvv").value
        if(cvv==""){
            alert("Enter cvv")
            return false;
        }
          let expireDate = document.getElementById("expireDate").value
        if(expireDate==""){
            alert("Enter ExpireDate")
            return false;
        }


        return true
    }
</script>
<div class="row mt-">
    <div class="col-md-4"></div>
    <div class="col-md-4">
        <br>
        <div class="card p-4 ">
            <form action="bookAppointment1" method="post" onsubmit="return validate()">
                <input type="hidden" name="slot_id" value="{{slot_id}}">
                 <input type="hidden" name="booking_date" value="{{booking_date}}">
                    <div class="mt-2">
                        <label for="cause">Cause</label>
                        <textarea  name="cause" id="cause" placeholder="Enter Cause" class="form-control"></textarea>
                    </div>
                <hr>
                 <div class="h6">Consultant Amount : <b> $ {{consultant_fee}}</b></div>

                    <div class="mt">
                        <label for="cardNumber">Card Number</label>
                        <input type="number" name="cardNumber" id="cardNumber" placeholder="Enter Card Number" class="form-control">
                    </div>
                    <div class="">
                        <label for="nameOnCard">Name on Card</label>
                        <input type="text" name="nameOnCard" id="nameOnCard" placeholder="Enter Name On Card" class="form-control">
                    </div>
                    <div class="">
                        <label for="nameOnCard">CVV</label>
                        <input type="text" name="cvv" id="cvv" placeholder="Enter CVV" class="form-control">
                    </div>
                    <div class="">
                        <label for="expireDate">Expire Date</label>
                        <input type="text" name="expireDate" id="expireDate" placeholder="MM/YY" class="form-control">
                    </div>
                <div class="mt-2">
                    <input type="submit" value="Book Appointment" class="btn btn-primary w-100">
                </div>
            </form>
        </div>
    </div>
</div>
