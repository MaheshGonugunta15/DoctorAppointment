{% include 'head.html' %}
<style>
    #name {
     padding: 10px;
    }
     #email {
     padding: 10px;
    }
     #phone {
     padding: 10px;
    }
     #picture {
     padding: 10px;
    }
     #password {
     padding: 10px;
    }

      #age {
     padding: 10px;
    }
      #bloodGroup {
     padding: 10px;
    }


</style>
<script>
function validate(){
        let name = document.getElementById("name").value
        if(name==""){
            alert("Enter Name")
            return false;
        }
        let email = document.getElementById("email").value
        if(email==""){
            alert("Enter Email")
            return false;
        }
        let password = document.getElementById("password").value
        if(password==""){
            alert("Enter Password")
            return false;
        }
        let phone = document.getElementById("phone").value
        if(phone==""){
            alert("Enter PhoneNumber")
            return false;
        }
        let bloodGroup = document.getElementById("bloodGroup").value
        if(bloodGroup==""){
            alert("Choose bloodGroup")
            return false;
        }
        let age = document.getElementById("age").value
        if(age==""){
            alert("Enter Age")
            return false;
        }
        let address = document.getElementById("address").value
        if(address==""){
            alert("Enter Address")
            return false;
        }

        return true
    }
</script>
<div class="container mt-5">
    <div class="card p-3">
        <div class="text-center h3">User Registration</div>
        <form action="userReg1" method="post" onsubmit="return validate()">
            <div class="row">
                <div class="col-md-6">
                 <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" name="name" id="name" placeholder="Enter Name"  class="form-control">
                </div>
                <div class="form-group mt-2">
                    <label for="email" >Email</label>
                    <input type="email" name="email" id="email" placeholder="Enter Email"  class="form-control mt-1">
                </div>
                <div class="form-group mt-2">
                    <label for="password" >Password</label>
                    <input type="password" name="password" id="password" placeholder="Enter Password"  class="form-control">
                </div>
                <div class="form-group mt-2">
                    <label for="phone">Phone</label>
                    <input type="number" name="phone" id="phone" placeholder="Enter Phone"  class="form-control mt-1" >
                </div>
                </div>
                <div class="col-md-6">
                   <div class="form-group mt-3">
                        <label for="gender">Gender</label>
                        <input type="radio" class="" id="gender"  value="male" name="gender" > <label for="gender">Male</label>
                        <input type="radio" id="gender1" name="gender" value="female" > <label for="gender">FeMale</label>
                    </div>

                    <div class="form-group mt-2">
                        <label for="bloodGroup">Blood Group</label>
                          <select name="bloodGroup" class="form-control mt-1" id="bloodGroup" >
                           <option value="A+">A+</option>
                                <option value="A-">A-</option>
                                <option value="B+">B+</option>
                                <option value="B-">B-</option>
                                <option value="O+">O+</option>
                                <option value="O-">O-</option>
                                <option value="AB+">AB+</option>
                               <option value="AB-">AB-</option>

                          </select>
                </div>
                      <div class="form-group mt-3">
                    <label for="age">Age</label>
                    <input type="number" name="age" id="age" placeholder="Enter Age" min="1" max="100"  class="form-control mt-1" >
                </div>
                    <div class="form-group mt-2">
                    <label for="address">Address</label>
                    <textarea name="address" id="address" placeholder="Enter Address"  class="form-control mt-1"></textarea>
                </div>
                </div>
                <input type="submit" value="Register" class="btn btn-success w-100 mt-3">
            </div>
        </form>
    </div>
</div>
