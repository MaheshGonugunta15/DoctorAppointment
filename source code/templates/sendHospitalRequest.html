{% include 'head.html'%}
<head>
<style>
body {
  background-image: url("https://img.rawpixel.com/s3fs-private/rawpixel_images/website_content/v870-tang-36_1.jpg?w=800&dpr=1&fit=default&crop=default&q=65&vib=3&con=3&usm=15&bg=F4F4F3&ixlib=js-2.2.1&s=d79f64b7b61002995177b5a8d81b522e");
  background-repeat: no-repeat; /* Do not repeat the image */
  background-size: cover;
  height:200px;
}
</style>
</head>
<div class="container mt-3">
    <form action="sendHospitalRequest">
        <div class="row">
            <div class="col-md-2"></div>
            <div class="col-md-4">
                <input type="text" style="font-size:17px" placeholder="Search Hospital " id="hospital_name"  class="form-control" name="hospital_name"  {% if hospital_name!=None: %} value="{{hospital_name}}" {% endif %}>
            </div>
            <div class="col-md-3">
                <input type="submit"  value="Search" class="btn btn-primary w-50">
            </div>
        </div>
    </form>
</div>
<div class="container mt-3">
    <div class="row">
      {% for hospital in hospitals %}
        {% set count=getSendRequestCount(hospital[0])%}
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                 <div class="h6 text-center"><img src="/static/hospitalPictures/{{hospital[4]}}" style="max-width:100%;height:70px"></div>
                   <hr>
                    <div class="row">
                        <div class="col-md-6">
                            <div class="" style="font-size:11px">Hospital Name :</div>
                              <a href="hospitalRatings?hospital_id={{hospital[0]}}">{{hospital[1]}}</a>
                             <div class="" style="font-size:11px">Phone Number :</div>
                            <div class="h6">{{hospital[3]}}</div>

                        </div>
                         <div class="col-md-6">
                             <div class="" style="font-size:11px">Speciality :</div>
                            <div class="h6">{{hospital[6]}}</div>
                              <div class="" style="font-size:11px">Address :</div>
                            <div class="h6">{{hospital[7]}}</div>
                         </div>
                    </div>
                    <div class="" style="font-size:11px">Email</div>
                      <div class="h6" style="font-size:14px">{{hospital[2]}}</div>
                </div>
                 <div class="card-footer">
                <a href="sendRequest?hospital_id={{hospital[0]}}" class="btn btn-info w-50">Send Request</a>
            </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
